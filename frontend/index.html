<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>תמלול סרטונים</title>
  <style>
    :root {
      /* Subtitling-suite palette — deep console dark + caption amber */
      --bg: #0A0D13;
      --bg-grain: #0C1018;
      --surface: #121826;
      --surface-2: #171F30;
      --elev: #1E273A;
      --border: #26314699;
      --border-solid: #263146;
      --text: #E8EDF6;
      --muted: #8894AB;
      --faint: #5C6880;
      --brand: #F5C860;        /* caption amber — the signature accent */
      --brand-ink: #1A1405;
      --queued: #F5A623;
      --processing: #57B6FF;
      --done: #3FD69A;
      --failed: #FF7A7A;
      --radius: 14px;
      --radius-sm: 9px;
      --shadow: 0 18px 50px -18px rgba(0,0,0,.75);
      --font-sans: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      --font-mono: ui-monospace, "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: var(--font-sans);
      color: var(--text);
      background:
        radial-gradient(1100px 620px at 85% -10%, #17223a 0%, transparent 55%),
        radial-gradient(900px 500px at 0% 0%, #1a1608 0%, transparent 45%),
        var(--bg);
      background-attachment: fixed;
      -webkit-font-smoothing: antialiased;
      line-height: 1.5;
    }

    /* ---------- Header ---------- */
    header {
      position: sticky; top: 0; z-index: 20;
      display: flex; align-items: center; gap: 16px;
      padding: 16px clamp(16px, 4vw, 40px);
      background: color-mix(in srgb, var(--bg) 78%, transparent);
      backdrop-filter: blur(14px) saturate(1.2);
      border-bottom: 1px solid var(--border);
    }
    .brand { display: flex; align-items: center; gap: 13px; min-width: 0; }
    .logo {
      display: flex; align-items: flex-end; gap: 3px; height: 30px; padding: 0 4px;
    }
    .logo span {
      width: 4px; border-radius: 3px; background: var(--brand);
      animation: eq 1.1s ease-in-out infinite;
    }
    .logo span:nth-child(1) { height: 30%; animation-delay: -.9s; }
    .logo span:nth-child(2) { height: 72%; animation-delay: -.5s; }
    .logo span:nth-child(3) { height: 100%; animation-delay: -.2s; opacity: .9; }
    .logo span:nth-child(4) { height: 55%; animation-delay: -.7s; }
    .logo span:nth-child(5) { height: 38%; animation-delay: -.35s; }
    @keyframes eq { 0%,100% { transform: scaleY(.45); } 50% { transform: scaleY(1); } }
    .titles { min-width: 0; }
    .titles h1 {
      margin: 0; font-size: 19px; font-weight: 800; letter-spacing: -.02em;
      white-space: nowrap;
    }
    .titles .eyebrow {
      font-family: var(--font-mono); font-size: 10.5px; letter-spacing: .18em;
      text-transform: uppercase; color: var(--faint);
    }
    .spacer { flex: 1; }
    .head-tools { display: flex; align-items: center; gap: 10px; }
    .chip {
      display: inline-flex; align-items: center; gap: 7px;
      font-family: var(--font-mono); font-size: 11.5px; color: var(--muted);
      background: var(--surface); border: 1px solid var(--border);
      padding: 7px 11px; border-radius: 999px; white-space: nowrap;
    }
    .chip b { color: var(--text); font-weight: 600; }
    .chip .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--brand); }
    @media (max-width: 720px) { .chip.model { display: none; } }

    .lang-select {
      font-family: var(--font-mono); font-size: 11.5px; color: var(--text);
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 999px; padding: 7px 11px; cursor: pointer;
      max-width: 160px; appearance: none; -webkit-appearance: none;
      background-image: linear-gradient(45deg, transparent 50%, var(--muted) 50%), linear-gradient(135deg, var(--muted) 50%, transparent 50%);
      background-position: calc(100% - 14px) center, calc(100% - 9px) center;
      background-size: 5px 5px, 5px 5px; background-repeat: no-repeat;
      padding-inline-end: 26px;
    }
    .lang-select:hover { border-color: #3a4763; }
    .lang-select:focus { outline: none; border-color: var(--brand); }
    .lang-select option { background: var(--surface-2); color: var(--text); }
    @media (max-width: 600px) { .lang-select { max-width: 130px; } }

    .lang-toggle {
      display: inline-flex; padding: 3px; gap: 2px;
      background: var(--surface); border: 1px solid var(--border); border-radius: 999px;
    }
    .lang-toggle button {
      font-family: var(--font-mono); font-size: 11.5px; font-weight: 600;
      color: var(--muted); background: transparent; border: 0; cursor: pointer;
      padding: 6px 11px; border-radius: 999px; letter-spacing: .04em;
    }
    .lang-toggle button.active { background: var(--brand); color: var(--brand-ink); }

    /* ---------- Layout ---------- */
    main { padding: clamp(20px, 4vw, 40px); max-width: 1180px; margin: 0 auto; }

    .toolbar {
      display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
      margin-bottom: 22px;
    }
    .counts { display: flex; gap: 8px; flex-wrap: wrap; }
    .count {
      display: inline-flex; align-items: center; gap: 7px;
      font-size: 12.5px; color: var(--muted);
      background: var(--surface); border: 1px solid var(--border);
      padding: 7px 12px; border-radius: 999px;
    }
    .count b { color: var(--text); font-variant-numeric: tabular-nums; }
    .count i { width: 7px; height: 7px; border-radius: 50%; font-style: normal; }
    .count.done i { background: var(--done); }
    .count.processing i { background: var(--processing); }
    .count.queued i { background: var(--queued); }

    button.btn {
      font-family: inherit; font-size: 13.5px; font-weight: 700; cursor: pointer;
      border-radius: var(--radius-sm); padding: 10px 17px; border: 1px solid transparent;
      transition: transform .08s ease, background .15s ease, border-color .15s ease;
    }
    button.btn:active { transform: translateY(1px); }
    button.btn:disabled { opacity: .5; cursor: default; }
    .btn-primary { background: var(--brand); color: var(--brand-ink); }
    .btn-primary:hover:not(:disabled) { background: #ffd776; }
    .btn-ghost { background: transparent; color: var(--text); border-color: var(--border-solid); }
    .btn-ghost:hover:not(:disabled) { background: var(--surface); }
    .status-msg { font-size: 12.5px; color: var(--muted); font-family: var(--font-mono); }
    .status-msg.err { color: var(--failed); }

    /* ---------- Video list (rows) ---------- */
    .list {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); overflow: hidden;
    }
    .list-head, .row {
      display: grid; align-items: center; gap: 16px;
      grid-template-columns: minmax(0, 1fr) 190px auto;
      padding: 12px 18px;
    }
    .list-head {
      font-family: var(--font-mono); font-size: 10.5px; letter-spacing: .14em;
      text-transform: uppercase; color: var(--faint);
      background: var(--surface-2); border-bottom: 1px solid var(--border);
    }
    .list-head .col-actions { text-align: end; }
    .row { border-bottom: 1px solid var(--border); transition: background .13s ease; }
    .row:last-child { border-bottom: 0; }
    .row.clickable { cursor: pointer; }
    .row.clickable:hover { background: var(--surface-2); }

    .cell-file { display: flex; align-items: center; gap: 12px; min-width: 0; }
    .file-icon {
      flex: none; width: 34px; height: 34px; border-radius: 9px;
      display: grid; place-items: center; background: var(--elev);
      border: 1px solid var(--border); color: var(--brand);
    }
    .file-name {
      font-family: var(--font-mono); font-size: 13px; word-break: break-all;
      color: var(--text); line-height: 1.4;
    }
    .file-sub { font-size: 11px; color: var(--faint); margin-top: 2px; font-family: var(--font-mono); }

    .pill {
      display: inline-flex; align-items: center; gap: 7px;
      font-size: 11.5px; font-weight: 700; letter-spacing: .02em;
      padding: 5px 11px; border-radius: 999px;
    }
    .pill.none { background: #ffffff0a; color: var(--muted); }
    .pill.queued { background: color-mix(in srgb, var(--queued) 16%, transparent); color: var(--queued); }
    .pill.processing { background: color-mix(in srgb, var(--processing) 16%, transparent); color: var(--processing); }
    .pill.done { background: color-mix(in srgb, var(--done) 15%, transparent); color: var(--done); }
    .pill.failed { background: color-mix(in srgb, var(--failed) 15%, transparent); color: var(--failed); }
    .pill .spin {
      width: 11px; height: 11px; border: 2px solid currentColor; border-top-color: transparent;
      border-radius: 50%; animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Progress rendered as a subtitle-timeline scrubber */
    .track { position: relative; height: 6px; border-radius: 999px; background: #0c1220; overflow: hidden; border: 1px solid var(--border); }
    .track .fill {
      position: absolute; inset-block: 0; inset-inline-start: 0;
      background: linear-gradient(90deg, var(--processing), #8fd0ff);
      border-radius: 999px; transition: width .5s ease;
    }
    .track .fill::after {
      content: ""; position: absolute; inset-inline-end: 0; inset-block: -1px; width: 2px;
      background: #fff; box-shadow: 0 0 8px 1px #8fd0ff; opacity: .9;
    }
    .cell-status { display: flex; flex-direction: column; gap: 7px; align-items: flex-start; }
    .track-row { display: flex; align-items: center; gap: 9px; width: 100%; }
    .track-row .pct { font-family: var(--font-mono); font-size: 11px; color: var(--processing); min-width: 30px; text-align: end; }
    .err-line { font-size: 11px; color: var(--failed); font-family: var(--font-mono); word-break: break-word; }

    .cell-actions { display: flex; align-items: center; gap: 8px; justify-content: flex-end; }
    @media (max-width: 680px) {
      .list-head { display: none; }
      .row { grid-template-columns: 1fr; gap: 12px; }
      .cell-actions { justify-content: flex-start; flex-wrap: wrap; }
    }
    /* Works for both <button> and <a> so download links look like real chips */
    .mini {
      display: inline-flex; align-items: center; gap: 6px;
      font-family: var(--font-mono); font-size: 11.5px; font-weight: 600; cursor: pointer;
      background: transparent; color: var(--brand); border: 1px solid var(--border-solid);
      padding: 6px 11px; border-radius: 8px; text-decoration: none;
      transition: background .15s ease, border-color .15s ease, color .15s ease;
    }
    .mini:hover { background: var(--surface-2); border-color: #3a4763; }
    .mini.solid { background: var(--brand); color: var(--brand-ink); border-color: transparent; }
    .mini.solid:hover { background: #ffd776; }
    .mini:disabled { opacity: .5; cursor: default; }
    /* Download chips — quiet, neutral, secondary to the actions */
    .mini.dl { color: var(--muted); border-color: var(--border-solid); }
    .mini.dl:hover { color: var(--text); background: var(--surface-2); }
    .mini.dl svg { color: var(--faint); }
    .mini.dl:hover svg { color: var(--brand); }
    .mini.danger { color: var(--failed); border-color: color-mix(in srgb, var(--failed) 40%, var(--border-solid)); padding: 6px 9px; }
    .mini.danger:hover { background: color-mix(in srgb, var(--failed) 14%, transparent); border-color: var(--failed); }
    .err-line { font-size: 11.5px; color: var(--failed); font-family: var(--font-mono); word-break: break-word; }

    /* ---------- States ---------- */
    .placeholder { grid-column: 1 / -1; text-align: center; padding: 72px 20px; color: var(--muted); }
    .placeholder .big { font-size: 15px; color: var(--text); margin-bottom: 6px; font-weight: 600; }
    .placeholder .sub { font-size: 13px; color: var(--faint); }
    .placeholder .mark { font-family: var(--font-mono); color: var(--faint); font-size: 40px; letter-spacing: .1em; margin-bottom: 14px; }

    /* ---------- Preview modal ---------- */
    .overlay {
      position: fixed; inset: 0; z-index: 50; display: none;
      align-items: center; justify-content: center; padding: 20px;
      background: rgba(4,6,10,.66); backdrop-filter: blur(4px);
    }
    .overlay.open { display: flex; animation: fade .18s ease; }
    @keyframes fade { from { opacity: 0; } to { opacity: 1; } }
    .modal {
      width: min(760px, 100%); max-height: 84vh; display: flex; flex-direction: column;
      background: var(--surface); border: 1px solid var(--border-solid);
      border-radius: 16px; box-shadow: var(--shadow); overflow: hidden;
      animation: rise .2s ease;
    }
    @keyframes rise { from { transform: translateY(10px); opacity: 0; } to { transform: none; opacity: 1; } }
    .modal-head { display: flex; align-items: center; gap: 12px; padding: 15px 18px; border-bottom: 1px solid var(--border); }
    .modal-head .mtitle { min-width: 0; }
    .modal-head .mtitle .name { font-family: var(--font-mono); font-size: 13px; word-break: break-all; }
    .modal-head .mtitle .meta { font-size: 11px; color: var(--faint); font-family: var(--font-mono); margin-top: 2px; }
    .seg { display: inline-flex; padding: 3px; gap: 2px; background: var(--bg); border: 1px solid var(--border); border-radius: 9px; }
    .seg button { font-family: var(--font-mono); font-size: 11.5px; font-weight: 600; color: var(--muted); background: transparent; border: 0; cursor: pointer; padding: 5px 10px; border-radius: 7px; }
    .seg button.active { background: var(--elev); color: var(--text); }
    .icon-btn { background: transparent; border: 1px solid var(--border-solid); color: var(--muted); cursor: pointer; width: 32px; height: 32px; border-radius: 8px; display: grid; place-items: center; }
    .icon-btn:hover { color: var(--text); background: var(--surface-2); }
    .modal-body {
      overflow: auto; padding: 18px; font-size: 14.5px; line-height: 1.85;
      white-space: pre-wrap; word-break: break-word;
    }
    .modal-body.srt { font-family: var(--font-mono); font-size: 12.5px; line-height: 1.7; color: var(--muted); }
    .modal-body .cue-idx { color: var(--faint); }
    .modal-body .cue-time { color: var(--processing); }
    .modal-body.empty-note { color: var(--faint); text-align: center; padding: 48px; font-style: italic; }
    .modal-foot { display: flex; align-items: center; gap: 8px; padding: 13px 18px; border-top: 1px solid var(--border); }
    .modal-foot .grow { flex: 1; }
    .modal-loading { padding: 48px; text-align: center; color: var(--muted); font-family: var(--font-mono); font-size: 13px; }

    @media (prefers-reduced-motion: reduce) {
      * { animation: none !important; transition: none !important; }
    }
    :focus-visible { outline: 2px solid var(--brand); outline-offset: 2px; }
    .grow { flex: 1; min-width: 0; }

    /* ---------- Telegram settings ---------- */
    .head-gear { font-size: 15px; line-height: 1; }
    .tg-note { font-size: 13px; color: var(--muted); margin-bottom: 16px; line-height: 1.6; }
    #tgSteps { display: flex; flex-direction: column; gap: 12px; margin-bottom: 16px; }
    .tg-step {
      display: flex; gap: 13px; background: var(--bg);
      border: 1px solid var(--border); border-radius: 12px; padding: 14px 15px;
    }
    .tg-step-num {
      flex: none; width: 26px; height: 26px; border-radius: 50%;
      display: grid; place-items: center; font-family: var(--font-mono); font-weight: 700;
      font-size: 13px; color: var(--brand-ink); background: var(--brand);
    }
    .tg-step-body { min-width: 0; flex: 1; }
    .tg-step-head { display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap; margin-bottom: 4px; }
    .tg-step-title { font-size: 14px; font-weight: 700; color: var(--text); }
    .tg-fills { font-size: 11px; color: var(--faint); font-family: var(--font-mono); }
    .tg-fills b { color: var(--brand); font-weight: 600; }
    .tg-step-note { font-size: 12px; color: var(--processing); margin-bottom: 6px; }
    .tg-substeps { margin: 6px 0 10px; padding-inline-start: 20px; display: flex; flex-direction: column; gap: 6px; }
    .tg-substeps li { font-size: 13px; color: var(--text); line-height: 1.55; }
    .tg-open { display: inline-flex; }
    .tg-final {
      font-size: 13px; color: var(--text); line-height: 1.6;
      background: color-mix(in srgb, var(--brand) 9%, transparent);
      border: 1px solid color-mix(in srgb, var(--brand) 22%, transparent);
      border-radius: 11px; padding: 12px 14px; margin-bottom: 4px;
    }
    .tg-form { display: flex; flex-direction: column; gap: 14px; margin-top: 18px; }
    .fld { display: flex; flex-direction: column; gap: 6px; font-size: 12.5px; color: var(--muted); flex: 1; }
    .fld-row { display: flex; gap: 12px; }
    .fld input {
      font-family: var(--font-mono); font-size: 13px; color: var(--text);
      background: var(--bg); border: 1px solid var(--border-solid); border-radius: 9px;
      padding: 10px 12px; width: 100%; transition: border-color .15s ease;
    }
    .fld input:focus { border-color: var(--brand); outline: none; }
    .fld-hint { color: var(--faint); font-size: 11px; }
    .fld-optional { margin-top: -6px; color: var(--processing); }
    .tg-toggle { display: flex; align-items: center; gap: 10px; font-size: 13.5px; color: var(--text); cursor: pointer; padding-top: 2px; }
    .tg-toggle input { width: 18px; height: 18px; accent-color: var(--brand); cursor: pointer; }
    @media (max-width: 560px) { .fld-row { flex-direction: column; } }

    /* connection status dot in the settings header */
    .conn { display: inline-flex; align-items: center; gap: 6px; font-family: var(--font-mono); font-size: 11.5px; }
    .conn i { width: 8px; height: 8px; border-radius: 50%; background: var(--faint); }
    .conn.connected i { background: var(--done); box-shadow: 0 0 7px var(--done); }
    .conn.connecting i { background: var(--processing); animation: pulse 1s ease-in-out infinite; }
    .conn.error i { background: var(--failed); }
    .conn.connected { color: var(--done); }
    .conn.error { color: var(--failed); }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .35; } }
  </style>
</head>
<body>
  <header>
    <div class="brand">
      <div class="logo" aria-hidden="true"><span></span><span></span><span></span><span></span><span></span></div>
      <div class="titles">
        <div class="eyebrow" data-t="eyebrow"></div>
        <h1 data-t="title"></h1>
      </div>
    </div>
    <div class="spacer"></div>
    <div class="head-tools">
      <span class="chip model" id="modelChip"><span class="dot"></span><span id="modelText"></span></span>
      <select id="langSelect" class="lang-select" aria-label="Transcription language"></select>
      <button class="icon-btn head-gear" id="btnSettings" title="Telegram" aria-label="Settings">⚙</button>
      <div class="lang-toggle" id="langToggle" role="group" aria-label="Language">
        <button data-lang="he">עב</button>
        <button data-lang="en">EN</button>
      </div>
    </div>
  </header>

  <main>
    <div class="toolbar">
      <button class="btn btn-primary" id="btnAll" data-t="processAll"></button>
      <button class="btn btn-ghost" id="btnRefresh" data-t="refresh"></button>
      <div class="counts" id="counts"></div>
      <div class="spacer"></div>
      <span class="status-msg" id="status"></span>
    </div>

    <div class="list">
      <div class="list-head">
        <span class="col-file" data-t="colFile"></span>
        <span class="col-status" data-t="colStatus"></span>
        <span class="col-actions" data-t="colActions"></span>
      </div>
      <div id="grid">
        <div class="placeholder"><div class="mark">···</div><div class="big" data-t="loading"></div></div>
      </div>
    </div>
  </main>

  <!-- Preview modal -->
  <div class="overlay" id="overlay" role="dialog" aria-modal="true">
    <div class="modal">
      <div class="modal-head">
        <div class="mtitle grow">
          <div class="name" id="pvName"></div>
          <div class="meta" id="pvMeta"></div>
        </div>
        <div class="seg" id="pvSeg">
          <button data-view="txt" class="active" data-t="viewText"></button>
          <button data-view="srt" data-t="viewSrt"></button>
        </div>
        <button class="icon-btn" id="pvClose" aria-label="Close">✕</button>
      </div>
      <div class="modal-body" id="pvBody"></div>
      <div class="modal-foot">
        <button class="mini" id="pvCopy" data-t="copy"></button>
        <div class="grow"></div>
        <a class="mini" id="pvSrt" data-t="downloadSrt" download></a>
        <a class="mini solid" id="pvTxt" data-t="downloadTxt" download></a>
      </div>
    </div>
  </div>

  <!-- Telegram settings modal -->
  <div class="overlay" id="setOverlay" role="dialog" aria-modal="true">
    <div class="modal">
      <div class="modal-head">
        <div class="mtitle grow">
          <div class="name" data-t="tgTitle"></div>
          <div class="meta" id="setStatus"></div>
        </div>
        <button class="icon-btn" id="setClose" aria-label="Close">✕</button>
      </div>
      <div class="modal-body" id="setBody">
        <div class="tg-note" data-t="tgIntro"></div>
        <div id="tgSteps"></div>
        <div class="tg-final" data-t="tgFinal"></div>
        <div class="tg-form">
          <label class="fld"><span data-t="tgToken"></span>
            <input id="fToken" type="password" autocomplete="off" placeholder="123456:ABC-DEF…" />
          </label>
          <div class="fld-row">
            <label class="fld"><span data-t="tgApiId"></span>
              <input id="fApiId" type="text" autocomplete="off" inputmode="numeric" placeholder="1234567" />
            </label>
            <label class="fld"><span data-t="tgApiHash"></span>
              <input id="fApiHash" type="password" autocomplete="off" placeholder="0123456789abcdef…" />
            </label>
          </div>
          <small class="fld-hint fld-optional" data-t="tgApiOptional"></small>
          <label class="fld"><span data-t="tgAllowed"></span>
            <input id="fAllowed" type="text" autocomplete="off" placeholder="123456789, 987654321" />
            <small class="fld-hint" data-t="tgAllowedHint"></small>
          </label>
          <label class="tg-toggle">
            <input id="fEnabled" type="checkbox" />
            <span data-t="tgEnable"></span>
          </label>
        </div>
      </div>

          { title: "Create the bot", fills: "Bot Token", link: "https://t.me/BotFather", linkText: "@BotFather",

            ] },
          { title: "Get api_id + api_hash — optional", fills: "API ID + API Hash",
            note: "Only if you want to send large videos (over 20MB, up to 2GB). For short videos, skip this and leave blank.",

            ] },

            items: [
              "Open @userinfobot in Telegram and press Start.",

              "Copy that number into the “Allowed User IDs” field. (This ensures only you can use the bot.)"
            ] },
        ],
        tgToken: "Bot Token", tgApiId: "API ID", tgApiHash: "API Hash",
        tgAllowed: "Allowed User IDs",
        tgAllowedHint: "Only these IDs can talk to the bot. Comma-separated.",
        tgEnable: "Enable the bot",
        tgConn: { connected: "Connected", connecting: "Connecting…", error: "Error",
                  disabled: "Off", not_configured: "Not configured" },
        tgLeaveBlank: "Leave blank to keep unchanged",
      },
    };

    let lang = localStorage.getItem("lang") || "he";
    if (!T[lang]) lang = "he";
    const t = (k) => T[lang][k];

    function applyLang() {
      const L = T[lang];
      document.documentElement.lang = L.htmlLang;
      document.documentElement.dir = L.dir;
      document.title = L.docTitle;
      document.querySelectorAll("[data-t]").forEach(el => {
        const v = L[el.dataset.t];
        if (typeof v === "string") el.textContent = v;
      });
      document.querySelectorAll("#langToggle button").forEach(b =>
        b.classList.toggle("active", b.dataset.lang === lang));
      renderTgSteps();
      loadConfig();
      render();
    }

    document.getElementById("langToggle").addEventListener("click", (e) => {
      const b = e.target.closest("button[data-lang]");
      if (!b) return;
      lang = b.dataset.lang; localStorage.setItem("lang", lang);
      applyLang();
    });

    // ---------- API ----------
    async function api(path, opts) {
      const res = await fetch(path, opts);
      if (!res.ok) {
        const body = await res.json().catch(() => ({}));
        throw new Error(body.detail || res.statusText);
      }
      return res.json();
    }

    function setStatus(msg, isErr) {
      const el = document.getElementById("status");
      el.textContent = msg || "";
      el.classList.toggle("err", !!isErr);
    }

    // ---------- Rendering ----------
    const ICON_FILM = '<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M7 4v16M17 4v16M3 9h4M3 15h4M17 9h4M17 15h4"/></svg>';
    const ICON_DL = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12m0 0l-4-4m4 4l4-4M4 21h16"/></svg>';

    function statusLabel(s) {
      return { none: t("st_none"), queued: t("st_queued"), processing: t("st_processing"), done: t("st_done"), failed: t("st_failed") }[s];
    }

    function pill(job) {
      if (!job) return `<span class="pill none">${statusLabel("none")}</span>`;
      const s = job.status;
      const spin = (s === "processing" || s === "queued") ? '<span class="spin"></span>' : "";
      let label = statusLabel(s);
      return `<span class="pill ${s}">${spin}${label}</span>`;
    }

    function row(item) {
      const job = item.job;
      const done = job && job.status === "done";
      const processing = job && job.status === "processing";
      const busy = job && (job.status === "queued" || job.status === "processing");
      const actionLabel = done ? t("again") : (job && job.status === "failed") ? t("retry") : t("transcribe");
      const fileEnc = encodeURIComponent(item.filename);

      // Status cell: pill, plus inline progress bar while processing / error line on failure.
      let statusExtra = "";
      if (processing) {
        const p = Math.round(job.progress || 0);
        statusExtra = `<div class="track-row">
            <div class="track" style="flex:1"><div class="fill" style="width:${p}%"></div></div>
            <span class="pct">${p}%</span>
          </div>`;
      } else if (job && job.status === "failed" && job.error) {
        statusExtra = `<div class="err-line">${escapeHtml(job.error)}</div>`;
      }

      const previewBtn = done
        ? `<button class="mini" data-preview="${job.id}" data-file="${escapeHtml(item.filename)}">${t("preview")}</button>`
        : "";
      const dlBlock = done
        ? `<a class="mini dl" href="/api/jobs/${job.id}/srt" download>${ICON_DL}${t("downloadSrt")}</a>
           <a class="mini dl" href="/api/jobs/${job.id}/txt" download>${ICON_DL}${t("downloadTxt")}</a>`
        : "";

      return `<div class="row ${done ? "clickable" : ""}" ${done ? `data-open="${job.id}" data-file="${escapeHtml(item.filename)}"` : ""}>
        <div class="cell-file">
          <div class="file-icon">${ICON_FILM}</div>
          <div style="min-width:0">
            <div class="file-name">${escapeHtml(item.filename)}</div>
            ${done && job.duration ? `<div class="file-sub" title="${t("procTime")}">⧗ ${formatDur(job.duration)}</div>` : ""}
          </div>
        </div>
        <div class="cell-status">
          ${pill(job)}
          ${statusExtra}
        </div>
        <div class="cell-actions">
          ${previewBtn}
          ${dlBlock}
          <button class="mini solid" data-transcribe="${fileEnc}" ${busy ? "disabled" : ""}>${actionLabel}</button>
          <button class="mini danger" data-delete="${escapeHtml(item.filename)}" ${busy ? "disabled" : ""} title="${t("deleteLabel")}" aria-label="${t("deleteLabel")}">🗑</button>
        </div>
      </div>`;
    }

    function renderCounts(videos) {
      let done = 0, processing = 0, queued = 0;
      videos.forEach(v => {
        const s = v.job && v.job.status;
        if (s === "done") done++;
        else if (s === "processing") processing++;
        else if (s === "queued") queued++;
      });
      const el = document.getElementById("counts");
      const parts = [];
      if (done) parts.push(`<span class="count done"><i></i>${t("cntDone")} <b>${done}</b></span>`);
      if (processing) parts.push(`<span class="count processing"><i></i>${t("cntProcessing")} <b>${processing}</b></span>`);
      if (queued) parts.push(`<span class="count queued"><i></i>${t("cntQueued")} <b>${queued}</b></span>`);
      el.innerHTML = parts.join("");
    }

    async function render() {
      try {
        const { videos } = await api("/api/videos");
        const grid = document.getElementById("grid");
        renderCounts(videos);
        if (!videos.length) {
          grid.innerHTML = `<div class="placeholder">
            <div class="mark">∅</div>
            <div class="big">${t("emptyBig")}</div>
            <div class="sub">${t("emptySub")}</div>
          </div>`;
          return;
        }
        grid.innerHTML = videos.map(row).join("");
        wireCards(grid, videos);
      } catch (e) {
        setStatus(t("netErr") + ": " + e.message, true);
      }
    }

    function wireCards(grid, videos) {
      const byId = {};
      videos.forEach(v => { if (v.job) byId[v.job.id] = v; });

      grid.querySelectorAll("button[data-transcribe]").forEach(btn => {
        btn.addEventListener("click", async (ev) => {
          ev.stopPropagation();
          btn.disabled = true;
          try {
            await api("/api/transcribe", {
              method: "POST", headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ filename: decodeURIComponent(btn.dataset.transcribe) }),
            });
            setStatus("");
            await render();
          } catch (e) { setStatus(t("err") + ": " + e.message, true); btn.disabled = false; }
        });
      });

      grid.querySelectorAll("button[data-delete]").forEach(btn => {
        btn.addEventListener("click", async (ev) => {
          ev.stopPropagation();
          const fname = btn.dataset.delete;
          if (!confirm(T[lang].deleteConfirm(fname))) return;
          btn.disabled = true;
          try {
            await api("/api/delete", {
              method: "POST", headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ filename: fname }),
            });
            setStatus("");
            await render();
          } catch (e) { setStatus(t("err") + ": " + e.message, true); btn.disabled = false; }
        });
      });

      grid.querySelectorAll("[data-open]").forEach(el => {
        el.addEventListener("click", (ev) => {
          if (ev.target.closest("a,button")) return; // let inner controls act
          openPreview(el.dataset.open, el.dataset.file);
        });
      });
      grid.querySelectorAll("button[data-preview]").forEach(btn => {
        btn.addEventListener("click", (ev) => {
          ev.stopPropagation();
          openPreview(btn.dataset.preview, btn.dataset.file);
        });
      });
    }

    // ---------- Preview modal ----------
    let pvState = { id: null, file: null, view: "txt" };

    async function openPreview(jobId, file) {
      pvState = { id: jobId, file, view: "txt" };
      document.getElementById("pvName").textContent = file;
      document.getElementById("pvMeta").textContent = "";
      document.getElementById("pvSrt").href = `/api/jobs/${jobId}/srt`;
      document.getElementById("pvTxt").href = `/api/jobs/${jobId}/txt`;
      document.querySelectorAll("#pvSeg button").forEach(b => b.classList.toggle("active", b.dataset.view === "txt"));
      document.getElementById("overlay").classList.add("open");
      await loadPreview();
    }

    async function loadPreview() {
      const body = document.getElementById("pvBody");
      body.className = "modal-body";
      body.innerHTML = `<div class="modal-loading">${t("pvLoading")}</div>`;
      try {
        const res = await fetch(`/api/jobs/${pvState.id}/${pvState.view}`);
        const text = await res.text();
        if (!text.trim()) {
          body.className = "modal-body empty-note";
          body.textContent = t("pvEmpty");
          document.getElementById("pvMeta").textContent = "";
          return;
        }
        if (pvState.view === "srt") {
          body.className = "modal-body srt";
          body.innerHTML = renderSrt(text);
          const cues = (text.match(/-->/g) || []).length;
          document.getElementById("pvMeta").textContent = T[lang].segCount(cues);
        } else {
          body.className = "modal-body";
          body.textContent = text;
          const lines = text.split("\n").filter(l => l.trim()).length;
          document.getElementById("pvMeta").textContent = T[lang].segCount(lines);
        }
      } catch (e) {
        body.className = "modal-body empty-note";
        body.textContent = t("err") + ": " + e.message;
      }
    }

    function renderSrt(text) {
      return escapeHtml(text)
        .replace(/^(\d+)$/gm, '<span class="cue-idx">$1</span>')
        .replace(/([0-9:,]+ --&gt; [0-9:,]+)/g, '<span class="cue-time">$1</span>');
    }

    document.getElementById("pvSeg").addEventListener("click", (e) => {
      const b = e.target.closest("button[data-view]");
      if (!b || b.dataset.view === pvState.view) return;
      pvState.view = b.dataset.view;
      document.querySelectorAll("#pvSeg button").forEach(x => x.classList.toggle("active", x === b));
      loadPreview();
    });

    document.getElementById("pvCopy").addEventListener("click", async () => {
      const body = document.getElementById("pvBody");
      try {
        await navigator.clipboard.writeText(body.innerText);
        const btn = document.getElementById("pvCopy");
        const orig = t("copy"); btn.textContent = t("copied");
        setTimeout(() => { btn.textContent = orig; }, 1400);
      } catch { /* clipboard blocked */ }
    });

    function closePreview() { document.getElementById("overlay").classList.remove("open"); }
    document.getElementById("pvClose").addEventListener("click", closePreview);
    document.getElementById("overlay").addEventListener("click", (e) => {
      if (e.target.id === "overlay") closePreview();
    });
    document.addEventListener("keydown", (e) => { if (e.key === "Escape") closePreview(); });

    // ---------- Toolbar actions ----------
    document.getElementById("btnAll").addEventListener("click", async () => {
      try {
        const r = await api("/api/transcribe-all", { method: "POST" });
        setStatus(r.count ? T[lang].added(r.count) : t("addedNone"));
        await render();
      } catch (e) { setStatus(t("err") + ": " + e.message, true); }
    });
    document.getElementById("btnRefresh").addEventListener("click", () => { setStatus(""); render(); });

    // Transcription-language options (native names; codes Whisper understands).
    const LANGS = [
      { code: "auto" }, { code: "he", name: "עברית" }, { code: "en", name: "English" },
      { code: "ar", name: "العربية" }, { code: "ru", name: "Русский" },
      { code: "fr", name: "Français" }, { code: "es", name: "Español" },
      { code: "de", name: "Deutsch" }, { code: "it", name: "Italiano" },
      { code: "pt", name: "Português" }, { code: "uk", name: "Українська" },
      { code: "yi", name: "ייִדיש" }, { code: "tr", name: "Türkçe" },
      { code: "pl", name: "Polski" }, { code: "nl", name: "Nederlands" },
    ];

    function buildLangSelect(current) {
      const sel = document.getElementById("langSelect");
      const list = LANGS.slice();
      // If the stored code isn't in our list, add it so it stays selectable.
      if (current && !list.some(l => l.code === current)) list.push({ code: current, name: current });
      sel.innerHTML = list.map(l => {
        const label = l.code === "auto" ? T[lang].langAuto : (l.name || l.code);
        return `<option value="${l.code}">${label}</option>`;
      }).join("");
      sel.value = current || "he";
    }

    async function loadConfig() {
      try {
        const c = await api("/api/config");
        document.getElementById("modelText").textContent = `${t("model")} ${c.model}`;
        buildLangSelect(c.language);
      } catch { /* non-critical */ }
    }

    document.getElementById("langSelect").addEventListener("change", async (e) => {
      try {
        await api("/api/language", {
          method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ language: e.target.value }),
        });
        setStatus(t("langSaved"));
      } catch (err) { setStatus(t("err") + ": " + err.message, true); }
    });

    // ---------- Helpers ----------
    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, c =>
        ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
    }
    function formatDur(sec) {
      sec = Math.round(sec);
      const m = Math.floor(sec / 60), s = sec % 60;
      return `${m}:${String(s).padStart(2, "0")}`;
    }

    // ---------- Telegram settings ----------
    let setPoll = null;

    function renderTgSteps() {
      const host = document.getElementById("tgSteps");
      if (!host) return;
      const guide = T[lang].tgGuide || [];
      host.innerHTML = guide.map((step, i) => `
        <div class="tg-step">
          <div class="tg-step-num">${i + 1}</div>
          <div class="tg-step-body">
            <div class="tg-step-head">
              <span class="tg-step-title">${escapeHtml(step.title)}</span>
              <span class="tg-fills">${T[lang].tgFills} <b>${escapeHtml(step.fills)}</b></span>
            </div>
            ${step.note ? `<div class="tg-step-note">${escapeHtml(step.note)}</div>` : ""}
            <ol class="tg-substeps">
              ${step.items.map(it => `<li>${escapeHtml(it)}</li>`).join("")}
            </ol>
            <a class="mini tg-open" href="${step.link}" target="_blank" rel="noopener">↗ ${T[lang].tgOpen} ${escapeHtml(step.linkText)}</a>
          </div>
        </div>`).join("");
    }

    function connBadge(data) {
      const el = document.getElementById("setStatus");
      const s = data.status || "not_configured";
      const label = (T[lang].tgConn && T[lang].tgConn[s]) || s;
      let extra = "";
      if (s === "connected") {
        if (data.bot_username) extra = ` @${data.bot_username}`;
        const cap = data.mode === "local" ? "2GB" : data.mode === "cloud" ? "20MB" : "";
        if (cap) extra += ` · ${lang === "he" ? "עד " : "up to "}${cap}`;
      }
      if (s === "error" && data.last_error) extra = ` · ${data.last_error}`;
      el.innerHTML = `<span class="conn ${s}"><i></i>${label}${escapeHtml(extra)}</span>`;
    }

    // Fills the form. Called only when opening the modal — never on the poll,
    // so it can't overwrite what the user is typing.
    async function loadSettings() {
      try {
        const d = await api("/api/settings/telegram");
        document.getElementById("fApiId").value = d.api_id || "";
        document.getElementById("fAllowed").value = d.allowed_ids || "";
        document.getElementById("fEnabled").checked = !!d.enabled;
        const tok = document.getElementById("fToken");
        const hash = document.getElementById("fApiHash");
        tok.value = ""; hash.value = "";
        tok.placeholder = d.has_token ? T[lang].tgLeaveBlank : "123456:ABC-DEF…";
        hash.placeholder = d.has_api_hash ? T[lang].tgLeaveBlank : "0123456789abcdef…";
        connBadge(d);
      } catch (e) { document.getElementById("setMsg").textContent = e.message; }
    }

    // Poll target: updates ONLY the connection badge, never the input fields.
    async function refreshStatus() {
      try { connBadge(await api("/api/settings/telegram")); } catch { /* ignore */ }
    }

    function openSettings() {
      document.getElementById("setMsg").textContent = "";
      document.getElementById("setOverlay").classList.add("open");
      loadSettings();
      setPoll = setInterval(refreshStatus, 3000); // status only — keeps your input
    }
    function closeSettings() {
      document.getElementById("setOverlay").classList.remove("open");
      if (setPoll) { clearInterval(setPoll); setPoll = null; }
    }

    async function saveSettings() {
      const btn = document.getElementById("setSave");
      btn.disabled = true;
      document.getElementById("setMsg").textContent = "";
      try {
        const payload = {
          bot_token: document.getElementById("fToken").value.trim(),
          api_id: document.getElementById("fApiId").value.trim(),
          api_hash: document.getElementById("fApiHash").value.trim(),
          allowed_ids: document.getElementById("fAllowed").value.trim(),
          enabled: document.getElementById("fEnabled").checked,
        };
        const d = await api("/api/settings/telegram", {
          method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });
        document.getElementById("fToken").value = "";
        document.getElementById("fApiHash").value = "";
        document.getElementById("setMsg").textContent = T[lang].tgSaved;
        connBadge(d);
        loadSettings();
      } catch (e) {
        document.getElementById("setMsg").textContent = t("err") + ": " + e.message;
      } finally { btn.disabled = false; }
    }

    document.getElementById("btnSettings").addEventListener("click", openSettings);
    document.getElementById("setClose").addEventListener("click", closeSettings);
    document.getElementById("setSave").addEventListener("click", saveSettings);
    document.getElementById("setOverlay").addEventListener("click", (e) => {
      if (e.target.id === "setOverlay") closeSettings();
    });
    document.addEventListener("keydown", (e) => { if (e.key === "Escape") closeSettings(); });

    // ---------- Boot ----------
    applyLang();
    setInterval(render, 4000); // poll job status
  </script>
</body>
</html>
